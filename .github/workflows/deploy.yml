# ============================================================================
# CI/CD 流水线配置
# ============================================================================
# 触发时机：
#   - pull_request → main：只跑编译 + 测试（不构建镜像、不部署）
#   - push → main：测试通过后，构建镜像 → 推 ACR → 部署服务器
#
# 为什么拆成两段：
#   分支保护要求 status check 通过才能合并 PR。
#   如果只在 push main 时跑 CI，PR 永远等不到检查结果，会卡死。
# ============================================================================

name: Build and Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  ACR_REGISTRY: crpi-tpudmz0tztfynq35.cn-guangzhou.personal.cr.aliyuncs.com
  ACR_NAMESPACE: interview-guide
  SERVER_HOST: 121.40.130.172

jobs:
  # ==========================================================================
  # Job 1：测试（PR 和 main push 都跑）
  # 这个 job 名会作为 GitHub status check 显示，分支保护应要求 "test"
  # ==========================================================================
  test:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 拉取代码
        uses: actions/checkout@v4

      - name: ☕ 安装 JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: 🔨 后端编译检查
        run: ./gradlew :app:compileJava --no-daemon

      - name: 🧪 后端单元测试
        run: ./gradlew :app:test --no-daemon

      - name: 📦 安装 Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 🔨 前端构建检查
        run: |
          npm install -g pnpm --registry=https://registry.npmmirror.com
          cd frontend
          pnpm config set registry https://registry.npmmirror.com
          pnpm install
          pnpm build

  # ==========================================================================
  # Job 2：部署（仅 main 分支 push 时跑；PR 不部署）
  # needs: test —— 测试不过，部署 job 不会启动
  # ==========================================================================
  deploy:
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: 📥 拉取代码
        uses: actions/checkout@v4

      - name: 🔑 登录阿里云镜像仓库
        run: docker login --username ${{ secrets.ACR_USERNAME }} -p ${{ secrets.ACR_PASSWORD }} ${{ env.ACR_REGISTRY }}

      - name: 🏗️ 构建推送后端镜像
        run: |
          docker build \
            -t ${{ env.ACR_REGISTRY }}/${{ env.ACR_NAMESPACE }}/app:latest \
            -t ${{ env.ACR_REGISTRY }}/${{ env.ACR_NAMESPACE }}/app:${{ github.sha }} \
            -f app/Dockerfile .
          docker push ${{ env.ACR_REGISTRY }}/${{ env.ACR_NAMESPACE }}/app:latest
          docker push ${{ env.ACR_REGISTRY }}/${{ env.ACR_NAMESPACE }}/app:${{ github.sha }}

      - name: 🏗️ 构建推送前端镜像
        run: |
          docker build \
            -t ${{ env.ACR_REGISTRY }}/${{ env.ACR_NAMESPACE }}/frontend:latest \
            -t ${{ env.ACR_REGISTRY }}/${{ env.ACR_NAMESPACE }}/frontend:${{ github.sha }} \
            -f frontend/Dockerfile frontend/
          docker push ${{ env.ACR_REGISTRY }}/${{ env.ACR_NAMESPACE }}/frontend:latest
          docker push ${{ env.ACR_REGISTRY }}/${{ env.ACR_NAMESPACE }}/frontend:${{ github.sha }}

      - name: 🚀 部署到服务器
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ env.SERVER_HOST }}
          username: root
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            cd /opt/interview-guide

            docker login --username ${{ secrets.ACR_USERNAME }} -p ${{ secrets.ACR_PASSWORD }} ${{ env.ACR_REGISTRY }}

            docker compose pull
            docker compose up -d

            echo "等待后端启动..."
            sleep 45

            for i in 1 2 3 4 5; do
              if curl -sf http://localhost:8080/actuator/health; then
                echo "✅ 部署成功，后端健康"
                exit 0
              fi
              echo "第 $i 次检查未就绪，等 10 秒..."
              sleep 10
            done

            echo "❌ 健康检查失败，请检查后端日志"
            docker logs interview-app --tail 30
            exit 1
