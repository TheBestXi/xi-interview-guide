# ============================================================================
# CI/CD 流水线配置
# ============================================================================
# 触发时机：push 到 main 分支时自动执行
# 流程：编译检查 → 构建镜像 → 推到 ACR → SSH 部署到服务器
#
# 你要做的只有一件事：git push origin main
# 剩下的全自动，约 5 分钟后线上就是新版本
# ============================================================================

name: Build and Deploy

# === 触发条件 ===
on:
  push:
    branches: [main]  # 只有 push 到 main 才触发（其他分支 push 不部署，安全）

# === 全局环境变量（所有 job 都能用）===
# 改这里：ACR 地址和命名空间。开好 ACR 后替换成你的真实值
env:
  ACR_REGISTRY: crpi-tpudmz0tztfynq35.cn-guangzhou.personal.cr.aliyuncs.com  # 阿里云 ACR 地址
  ACR_NAMESPACE: interview-guide                    # ACR 命名空间
  SERVER_HOST: 121.40.130.172                       # 你的服务器 IP

jobs:
  build-and-deploy:
    # Runner 用 GitHub 提供的 Ubuntu 机器（免费）
    runs-on: ubuntu-latest

    steps:
      # ======================================================================
      # 步骤 1：拉取你的代码到 Runner
      # ======================================================================
      - name: 📥 拉取代码
        uses: actions/checkout@v4

      # ======================================================================
      # 步骤 2：装 JDK 21（后端编译需要）
      # ======================================================================
      - name: ☕ 安装 JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      # ======================================================================
      # 步骤 3：后端编译检查（确认代码没语法错，不会打包）
      # 如果编译失败，流水线在这里停住，不会部署烂代码
      # ======================================================================
      - name: 🔨 后端编译检查
        run: ./gradlew :app:compileJava --no-daemon

      # ======================================================================
      # 步骤 3.5：后端单元测试
      # 跑 app 模块下所有 JUnit 测试，失败立即停住流水线，不允许部署
      # 这是 Phase 0 的核心：拦住"编译能过但功能不对"的代码
      # ======================================================================
      - name: 🧪 后端单元测试
        run: ./gradlew :app:test --no-daemon

      # ======================================================================
      # 步骤 4：装 Node 20 + pnpm，前端构建检查
      # ======================================================================
      - name: 📦 安装 Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 🔨 前端构建检查
        run: |
          npm install -g pnpm --registry=https://registry.npmmirror.com
          cd frontend
          pnpm config set registry https://registry.npmmirror.com
          pnpm install
          pnpm build

      # ======================================================================
      # 步骤 5：登录阿里云 ACR（用 Secrets 里的账号密码）
      # ======================================================================
      - name: 🔑 登录阿里云镜像仓库
        run: docker login --username ${{ secrets.ACR_USERNAME }} -p ${{ secrets.ACR_PASSWORD }} ${{ env.ACR_REGISTRY }}

      # ======================================================================
      # 步骤 6：构建并推送后端镜像
      # 用 app/Dockerfile 构建，打 latest 标签 + commit 号标签（方便回滚）
      # ======================================================================
      - name: 🏗️ 构建推送后端镜像
        run: |
          docker build \
            -t ${{ env.ACR_REGISTRY }}/${{ env.ACR_NAMESPACE }}/app:latest \
            -t ${{ env.ACR_REGISTRY }}/${{ env.ACR_NAMESPACE }}/app:${{ github.sha }} \
            -f app/Dockerfile .
          docker push ${{ env.ACR_REGISTRY }}/${{ env.ACR_NAMESPACE }}/app:latest
          docker push ${{ env.ACR_REGISTRY }}/${{ env.ACR_NAMESPACE }}/app:${{ github.sha }}

      # ======================================================================
      # 步骤 7：构建并推送前端镜像
      # 注意：前端 Dockerfile 的构建上下文是 frontend/ 目录
      # ======================================================================
      - name: 🏗️ 构建推送前端镜像
        run: |
          docker build \
            -t ${{ env.ACR_REGISTRY }}/${{ env.ACR_NAMESPACE }}/frontend:latest \
            -t ${{ env.ACR_REGISTRY }}/${{ env.ACR_NAMESPACE }}/frontend:${{ github.sha }} \
            -f frontend/Dockerfile frontend/
          docker push ${{ env.ACR_REGISTRY }}/${{ env.ACR_NAMESPACE }}/frontend:latest
          docker push ${{ env.ACR_REGISTRY }}/${{ env.ACR_NAMESPACE }}/frontend:${{ github.sha }}

      # ======================================================================
      # 步骤 8：SSH 到服务器部署
      # 用第三方 Action（appleboy/ssh-action）SSH 到服务器执行命令
      # 服务器登录 ACR → 拉新镜像 → 重启容器 → 健康检查
      # ======================================================================
      - name: 🚀 部署到服务器
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ env.SERVER_HOST }}
          username: root
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            # 进项目目录
            cd /opt/interview-guide

            # 登录 ACR（服务器也要登录才能拉私有镜像）
            docker login --username ${{ secrets.ACR_USERNAME }} -p ${{ secrets.ACR_PASSWORD }} ${{ env.ACR_REGISTRY }}

            # 拉最新镜像
            docker compose pull

            # 重启容器（用新镜像）
            docker compose up -d

            # 等后端启动（Spring Boot 初始化要时间）
            echo "等待后端启动..."
            sleep 45

            # 健康检查：连试 5 次，每次隔 10 秒
            for i in 1 2 3 4 5; do
              if curl -sf http://localhost:8080/actuator/health; then
                echo "✅ 部署成功，后端健康"
                exit 0
              fi
              echo "第 $i 次检查未就绪，等 10 秒..."
              sleep 10
            done

            # 5 次都没过，标记失败（GitHub Actions 会显示红色叉）
            echo "❌ 健康检查失败，请检查后端日志"
            docker logs interview-app --tail 30
            exit 1
